# Cloud deployment: no GPU, no local inference.
#
# Standalone stack (app + postgres + caddy) for a plain VPS (Hostinger KVM,
# Hetzner, etc.). Chat runs through OpenRouter (LLM_PROVIDER=openrouter), so
# there is no `ollama` service here — nothing in the app uses it once chat is
# an API call. (Semantic search is keyword-only today; when it grows an
# embedding step, choose an embeddings provider then.)
#
# Use it on its own, NOT layered over compose.yml:
#   docker compose -f compose.cloud.yml up -d --build
# or set COMPOSE_FILE=compose.cloud.yml in the environment.
#
# Fill .env first (see .env.example) — at minimum OPENROUTER_API_KEY and
# CADDY_TLS=<your-email> for a real Let's Encrypt cert on a public host.
services:
  app:
    build: .
    image: family-assistant:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Household-local time: "today" (dashboard, tasks, horoscope) follows
      # this rather than UTC, which is a day ahead every evening.
      TZ: ${TZ:-America/Toronto}
      DATABASE_URL: ${DATABASE_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      LLM_PROVIDER: ${LLM_PROVIDER:-openrouter}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:?OPENROUTER_API_KEY is required when LLM_PROVIDER=openrouter}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.5-flash-lite}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-}
      USER1_EMAIL: ${USER1_EMAIL:-}
      USER1_PASSWORD_HASH: ${USER1_PASSWORD_HASH:-}
      USER2_EMAIL: ${USER2_EMAIL:-}
      USER2_PASSWORD_HASH: ${USER2_PASSWORD_HASH:-}
    volumes:
      # Horoscope natal facts (derived chart facts only, no birth data).
      # Built locally by scripts/build_natal_facts.py and scp'd to the
      # server's Data/ dir; single-file mount keeps everything else out.
      - ./Data/natal_facts.json:/app/Data/natal_facts.json:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: family_assistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in .env}
      POSTGRES_DB: family_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U family_assistant -d family_assistant"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_HOSTNAME: ${APP_HOSTNAME}
      CADDY_TLS: ${CADDY_TLS:-internal}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
